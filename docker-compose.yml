services:
  mongodb:
    image: mongo:7.0
    container_name: groupcart-mongodb
    restart: unless-stopped
    environment:
      - MONGO_INITDB_ROOT_USERNAME=${MONGO_USER:-admin}
      - MONGO_INITDB_ROOT_PASSWORD=${MONGO_PASSWORD:-adminpassword}
    volumes:
      - mongodb_data:/data/db
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

  groupcart:
    image: ghcr.io/smartska97/groupcart:latest
    container_name: groupcart
    restart: unless-stopped
    depends_on:
      mongodb:
        condition: service_started
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - MONGO_URI=mongodb://${MONGO_USER:-admin}:${MONGO_PASSWORD:-adminpassword}@mongodb:27017/groupcart?authSource=admin
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-admin123}
    volumes:
      - ./data:/app/data

  reverse-proxy:
    image: nginx:alpine
    container_name: groupcart-proxy
    restart: unless-stopped
    ports:
      - "80:80"
    entrypoint:
      - sh
      - -c
      - |
        cat << 'EOF' > /etc/nginx/conf.d/default.conf
        server {
            listen 80;
            server_name localhost _;

            location / {
                proxy_pass http://groupcart:3000;
                proxy_http_version 1.1;
                proxy_set_header Upgrade $$http_upgrade;
                proxy_set_header Connection 'upgrade';
                proxy_set_header Host $$host;
                proxy_cache_bypass $$http_upgrade;
                proxy_set_header X-Real-IP $$remote_addr;
                proxy_set_header X-Forwarded-For $$proxy_add_x_forwarded_for;
                proxy_set_header X-Forwarded-Proto $$scheme;
            }

            location /api/events {
                proxy_pass http://groupcart:3000;
                proxy_http_version 1.1;
                proxy_set_header Connection '';
                proxy_set_header Host $$host;
                proxy_set_header X-Real-IP $$remote_addr;
                proxy_set_header X-Forwarded-For $$proxy_add_x_forwarded_for;
                proxy_set_header X-Forwarded-Proto $$scheme;
                proxy_buffering off;
                proxy_cache off;
                chunked_transfer_encoding off;
                proxy_read_timeout 24h;
            }
        }
        EOF
        exec nginx -g 'daemon off;'
    depends_on:
      - groupcart

volumes:
  mongodb_data:
